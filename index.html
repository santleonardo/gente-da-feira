<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gente da Feira | Hub FSA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'feira-yellow': '#FFD700', 
                        'feira-bege': '#FDFDF7',   
                        'feira-marinho': '#1E3A5F'
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #FDFDF7; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="text-gray-900 pb-20">

    <header class="bg-white border-b-2 border-gray-100 sticky top-0 z-40 p-4 flex justify-between items-center shadow-sm">
        <h1 class="font-black text-xl tracking-tighter text-feira-marinho">GENTE DA <span class="text-feira-yellow">FEIRA</span></h1>
    </header>

    <section id="auth-screen" class="min-h-[80vh] flex flex-col items-center justify-center p-6">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm border-t-8 border-feira-yellow">
            <div class="text-center mb-6">
                <span class="text-4xl">☀️</span>
                <h2 class="text-2xl font-black mt-2 uppercase">Conectar</h2>
                <p id="auth-status" class="text-[10px] text-gray-400 mt-2"></p>
            </div>
            <div class="space-y-4">
                <input type="email" id="auth-email" placeholder="E-mail" class="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-feira-yellow border-none">
                <input type="password" id="auth-password" placeholder="Senha" class="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-feira-yellow border-none">
                
                <button onclick="tentarLogar()" id="btn-login" class="w-full bg-feira-marinho text-white py-4 rounded-2xl font-black uppercase shadow-lg active:scale-95 transition-all">
                    Entrar
                </button>
                
                <button onclick="tentarCadastrar()" class="w-full text-gray-400 py-2 text-xs font-bold uppercase">
                    Criar Nova Conta
                </button>
            </div>
        </div>
    </section>

    <main id="feed-container" class="hidden p-4 space-y-4 min-h-screen"></main>

    <footer id="main-nav" class="hidden fixed bottom-0 w-full bg-white border-t-2 border-gray-100 flex justify-around p-3 z-50 shadow-lg">
        <button onclick="mostrarTela('feed-container')" class="text-2xl">🏠</button>
        <button onclick="abrirPostagem()" class="bg-feira-yellow w-12 h-12 rounded-full font-black -mt-8 border-4 border-white shadow-xl">+</button>
        <button onclick="gerenciarBotaoPerfil()" class="text-2xl">👤</button>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        // 1. CONFIGURAÇÃO UNIFICADA
        const URL_FSA = 'https://oecoggegxlortfcsnagd.supabase.co';
        const KEY_FSA = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9lY29nZ2VneGxvcnRmY3NuYWdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NzIwMDYsImV4cCI6MjA5MjQ0ODAwNn0.ccE4T_tdNeA2FogKBQOWQM9snOiHEnjGIUvhD4qEFm8';
        
        // Inicializa na window para que o app.js herde esta conexão
        window._supabase = supabase.createClient(URL_FSA, KEY_FSA);

        async function tentarLogar() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const btn = document.getElementById('btn-login');

            if(!email || !password) return alert("Preencha os campos!");

            btn.innerText = "A ENTRAR...";
            btn.disabled = true;

            try {
                const { data, error } = await window._supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
                
                // Sucesso: Recarrega a página. O app.js agora verá a sessão ativa.
                window.location.reload();
            } catch (err) {
                alert("Erro: " + err.message);
                btn.innerText = "ENTRAR";
                btn.disabled = false;
            }
        }

        async function tentarCadastrar() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            try {
                const { error } = await window._supabase.auth.signUp({ email, password });
                if (error) throw error;
                alert("Verifique seu e-mail para confirmar a conta!");
            } catch (err) {
                alert(err.message);
            }
        }
    </script>

    <script src="app.js"></script>
</body>
</html>
