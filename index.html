<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gente da Feira | Hub FSA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'feira-yellow': '#FFD700', 
                        'feira-bege': '#FDFDF7',   
                        'feira-marinho': '#1E3A5F',
                        'feira-bronze': '#CD7F32'
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #FDFDF7; }
        .hidden { display: none !important; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        button:active { transform: scale(0.95); transition: 0.1s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-gray-900 pb-24 overflow-x-hidden">

   <header class="p-6 flex justify-between items-center max-w-xl mx-auto">
    <h1 class="text-2xl font-black tracking-tighter text-feira-marinho italic underline decoration-feira-yellow decoration-4">GENTE DA <span class="text-feira-yellow">FEIRA</span></h1>
    <button id="btn-sair" onclick="fazerLogout()" class="hidden text-[10px] font-black uppercase text-gray-300 hover:text-red-400 transition-all">Sair</button>
</header>

<section id="auth-screen" class="hidden p-6 max-w-sm mx-auto text-center animate-fade-in">
    <div class="mb-10 mt-10">
        <h2 class="text-3xl font-black text-feira-marinho">O portal da sua cidade.</h2>
        <p class="text-gray-400 text-sm mt-2 font-medium">Conecte-se com Feira de Santana.</p>
    </div>
    <div class="space-y-3">
        <input id="auth-email" type="email" placeholder="Seu e-mail" class="w-full p-4 rounded-2xl bg-white border border-gray-100 outline-none focus:ring-2 ring-feira-yellow transition-all">
        <input id="auth-password" type="password" placeholder="Sua senha" class="w-full p-4 rounded-2xl bg-white border border-gray-100 outline-none focus:ring-2 ring-feira-yellow transition-all">
        <div class="flex gap-2 pt-4">
            <button onclick="fazerLogin()" class="flex-1 bg-feira-marinho text-white py-4 rounded-2xl font-black uppercase shadow-lg">Entrar</button>
            <button onclick="fazerCadastro()" class="flex-1 bg-white text-feira-marinho py-4 rounded-2xl font-black uppercase border border-gray-100">Criar Conta</button>
        </div>
    </div>
</section>

<section id="edit-profile-screen" class="hidden p-6 max-w-xl mx-auto animate-fade-in">
    <div class="flex justify-between items-center mb-6">
        <button onclick="mostrarTela('feed-container')" class="text-xs font-black uppercase text-gray-400">Voltar</button>
        <h3 class="font-black text-feira-marinho text-xs uppercase tracking-widest">Meu Perfil</h3>
        <div class="w-10"></div>
    </div>
    <div class="space-y-4">
        <div class="flex flex-col items-center mb-6">
            <div id="profile-avatar-preview" class="w-24 h-24 rounded-3xl bg-gray-100 border-4 border-white shadow-lg mb-2 bg-cover bg-center"></div>
            <input id="profile-avatar-url" type="text" placeholder="URL da Foto de Perfil" class="w-full p-3 text-xs rounded-xl bg-white border border-gray-100 outline-none">
        </div>
        <input id="profile-username" type="text" placeholder="Seu Nome ou Empresa" class="w-full p-4 rounded-2xl bg-white border border-gray-100 outline-none">
        <textarea id="profile-bio" placeholder="Sua bio (ex: Especialista em Storytelling)" class="w-full h-24 p-4 rounded-2xl bg-white border border-gray-100 outline-none resize-none"></textarea>
        <select id="profile-bairro" class="w-full p-4 rounded-2xl bg-white border border-gray-100 outline-none">
            <option value="Geral">Seu Bairro</option>
            <option value="SIM">SIM</option>
            <option value="Tomba">Tomba</option>
            <option value="Centro">Centro</option>
            <option value="Cidade Nova">Cidade Nova</option>
        </select>
        <button onclick="salvarPerfil()" class="w-full bg-feira-marinho text-white py-4 rounded-2xl font-black uppercase shadow-lg">Guardar Alterações</button>
    </div>
</section>
    <nav id="feed-tabs" class="hidden max-w-xl mx-auto px-4 pt-4 flex gap-2">
        <button onclick="mudarFeed('Geral')" id="tab-geral" class="flex-1 py-3 rounded-2xl font-black uppercase text-[10px] bg-feira-marinho text-white shadow-md">Feira Toda</button>
        <button onclick="mudarFeed('Local')" id="tab-local" class="flex-1 py-3 rounded-2xl font-black uppercase text-[10px] bg-white text-gray-400 border border-gray-100">Meu Bairro</button>
    </nav>

    <main id="feed-container" class="hidden p-4 space-y-4 min-h-screen max-w-xl mx-auto"></main>

    <footer id="main-nav" class="hidden fixed bottom-0 w-full bg-white border-t-2 border-gray-100 flex justify-around p-3 z-50 shadow-2xl">
        <button onclick="mudarFeed('Geral')" class="text-2xl">🏠</button>
        <button onclick="abrirPostagem()" class="bg-feira-yellow w-14 h-14 rounded-2xl font-black -mt-10 border-4 border-white shadow-xl flex items-center justify-center text-feira-marinho text-2xl">+</button>
        <button onclick="mostrarTela('edit-profile-screen')" class="text-2xl">👤</button>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
