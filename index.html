<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gente da Feira</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

</head>

<body class="bg-[#FDFDF7] text-gray-800">

  <!-- 🔝 HEADER LIMPO -->
  <div class="flex justify-between items-center p-4 max-w-xl mx-auto">
    <div>
      <p class="text-xs text-gray-500">📍 Sua área</p>
      <h1 class="font-bold text-lg">Mangabeira</h1>
    </div>

    <button class="text-sm text-gray-500">Sair</button>
  </div>

  <!-- 🔍 BUSCA PRINCIPAL -->
  <div class="p-4 max-w-xl mx-auto">
    <input
      id="searchInput"
      placeholder="O que você precisa agora?"
      class="w-full p-4 rounded-xl border text-lg"
      onkeypress="if(event.key==='Enter') buscar()"
    />
  </div>

  <!-- 🔥 AÇÕES PRINCIPAIS -->
  <div class="grid grid-cols-2 gap-3 px-4 max-w-xl mx-auto">

    <button onclick="abrirEmpregos()" class="bg-white p-3 rounded-xl shadow">
      💼 Emprego hoje
    </button>

    <button onclick="abrirPromocoes()" class="bg-white p-3 rounded-xl shadow">
      💸 Promoções
    </button>

    <button onclick="abrirServicos()" class="bg-white p-3 rounded-xl shadow">
      🧑‍🔧 Serviços
    </button>

    <button onclick="buscar()" class="bg-white p-3 rounded-xl shadow">
      🔍 Buscar
    </button>

  </div>

  <!-- 🔥 ACONTECENDO AGORA -->
  <div class="p-4 max-w-xl mx-auto">
    <h2 class="font-bold mb-2">🔥 Acontecendo agora</h2>

    <div id="agora" class="space-y-2">
      <!-- dados dinâmicos depois -->
    </div>
  </div>

  <!-- 📊 RESULTADOS DA BUSCA -->
  <div id="results" class="p-4 max-w-xl mx-auto"></div>

  <!-- 💬 FEED (REBAIXADO) -->
  <div class="p-4 max-w-xl mx-auto">
    <h2 class="text-sm text-gray-500 mb-2">Atividade do bairro</h2>

    <div id="feed">
      <!-- seu feed atual pode ficar aqui -->
    </div>
  </div>

  <!-- ➕ BOTÃO FLUTUANTE -->
  <button class="fixed bottom-20 right-4 bg-yellow-400 w-14 h-14 rounded-full shadow-lg text-xl">
    +
  </button>

  <!-- JS -->
  <script src="js/supabase.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
