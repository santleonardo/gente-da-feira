<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Conecte-se com seu bairro em Feira de Santana - Vagas, serviços, promoções e muito mais">
    <meta name="theme-color" content="#F59E0B">
    <title>Gente da Feira - Seu bairro, suas soluções</title>

    <!-- PWA -->
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./icon-192.png">

    <!-- Leaflet CSS (Mapa) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <script type="module" src="app.js"></script>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Leaflet JS (Mapa) -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Configuração Tailwind customizada -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'terra-sol': '#F59E0B',
                        'terra-escura': '#78350F',
                        'noite-feira': '#0F172A',
                        'asfalto': '#1E293B',
                        'papel': '#FAFAF9',
                        'concreto': '#52525B',
                    },
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        /* Reset e otimizações PWA */
        * {
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            overscroll-behavior-y: contain;
        }

        /* Animações suaves */
        .smooth-enter {
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Badge de notificação */
        .badge-notif {
            min-width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Skeleton loading */
        .skeleton {
            background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Esconde scrollbar horizontal mas mantém funcionalidade */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Line clamp para descrição nos cards */
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Mapa */
        #mapa-container {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Leaflet popup customizado */
        .leaflet-popup-content-wrapper {
            border-radius: 16px !important;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15) !important;
        }
        .leaflet-popup-content {
            margin: 10px 14px !important;
        }

        /* Chat scroll */
        #chat-mensagens {
            scroll-behavior: smooth;
        }
    </style>
</head>

<body class="bg-papel font-sans text-slate-900 antialiased">

    <!-- ========================================
         ZONA 1: CONTEXTO (Header Fixo - Sticky)
    ========================================= -->
    <header id="zona-contexto" class="sticky top-0 z-50 bg-noite-feira text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 py-3">
            <div class="flex items-center justify-between">

                <!-- Seletor de Bairro -->
                <button
                    id="btn-selecionar-bairro"
                    class="flex items-center gap-2 px-3 py-2 rounded-lg bg-asfalto hover:bg-slate-700 transition-colors active:scale-95"
                    aria-label="Trocar de bairro">
                    <svg class="w-5 h-5 text-terra-sol" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                    <div class="text-left">
                        <div class="text-xs text-gray-400">Você está em</div>
                        <div id="bairro-atual" class="text-sm font-semibold">Mangabeira</div>
                    </div>
                    <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                    </svg>
                </button>

                <!-- Notificações + Avatar -->
                <div class="flex items-center gap-3">
                    <button
                        id="btn-notificacoes"
                        class="relative p-2 rounded-lg hover:bg-asfalto transition-colors"
                        aria-label="Ver notificações">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                        </svg>
                        <span id="badge-notif" class="hidden absolute top-0 right-0 badge-notif bg-red-600 text-white text-xs font-bold rounded-full px-1.5">
                            0
                        </span>
                    </button>

                    <button
                        id="btn-perfil"
                        class="w-9 h-9 rounded-full bg-terra-sol flex items-center justify-center text-noite-feira font-bold text-sm hover:ring-2 ring-white transition-all"
                        aria-label="Meu perfil">
                        <span id="avatar-iniciais">👤</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- ========================================
         ZONA 2: CAIXA DE INTENÇÃO (Hero Search)
    ========================================= -->
    <section id="zona-intencao" class="bg-gradient-to-b from-noite-feira to-asfalto text-white">
        <div class="max-w-7xl mx-auto px-4 py-6">

            <div class="relative">
                <div class="relative">
                    <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                    <input
                        id="busca-intencao"
                        type="search"
                        placeholder="O que você precisa na Mangabeira agora?"
                        class="w-full pl-12 pr-4 py-4 bg-white text-slate-900 rounded-2xl text-base placeholder-gray-500 focus:outline-none focus:ring-4 focus:ring-terra-sol/30 shadow-xl"
                        autocomplete="off"
                        aria-label="Buscar serviços, vagas ou promoções">
                </div>

                <!-- Dropdown de Sugestões Rápidas -->
                <div id="sugestoes-rapidas" class="hidden absolute top-full left-0 right-0 mt-2 bg-white rounded-2xl shadow-2xl overflow-hidden z-40">
                    <div class="p-2 space-y-1" id="lista-sugestoes"></div>
                </div>
            </div>

            <!-- Atalhos de Busca Rápida -->
            <div class="flex gap-2 mt-4 overflow-x-auto pb-2 scrollbar-hide">
                <button class="pill-busca px-4 py-2 bg-white/10 hover:bg-white/20 rounded-full text-sm whitespace-nowrap transition-colors" data-query="pedreiro">
                    🛠️ Pedreiro
                </button>
                <button class="pill-busca px-4 py-2 bg-white/10 hover:bg-white/20 rounded-full text-sm whitespace-nowrap transition-colors" data-query="manicure">
                    💅 Manicure
                </button>
                <button class="pill-busca px-4 py-2 bg-white/10 hover:bg-white/20 rounded-full text-sm whitespace-nowrap transition-colors" data-query="entrega">
                    📦 Entrega
                </button>
                <button class="pill-busca px-4 py-2 bg-white/10 hover:bg-white/20 rounded-full text-sm whitespace-nowrap transition-colors" data-query="diarista">
                    🧹 Diarista
                </button>
            </div>
        </div>
    </section>

    <!-- ========================================
         ZONA 3: GRID DE UTILIDADE VIVA (2x2)
    ========================================= -->
    <section id="zona-utilidade" class="bg-papel">
        <div class="max-w-7xl mx-auto px-4 py-6">
            <div class="grid grid-cols-2 lg:grid-cols-3 gap-3">

                <button id="card-vagas" class="card-utilidade group bg-white p-4 rounded-2xl shadow-sm hover:shadow-lg active:scale-95 transition-all text-left border-2 border-transparent hover:border-terra-sol" data-categoria="vagas">
                    <div class="flex items-start justify-between mb-3">
                        <div class="w-12 h-12 bg-gradient-to-br from-blue-500 to-blue-600 rounded-xl flex items-center justify-center group-hover:scale-110 transition-transform">
                            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                            </svg>
                        </div>
                        <span class="inline-flex items-center px-2 py-1 bg-blue-100 text-blue-700 text-xs font-bold rounded-full" id="badge-vagas">0</span>
                    </div>
                    <h3 class="text-base font-bold text-slate-900 mb-1">Vagas hoje</h3>
                    <p class="text-xs text-gray-600">Oportunidades perto de você</p>
                </button>

                <button id="card-promocoes" class="card-utilidade group bg-white p-4 rounded-2xl shadow-sm hover:shadow-lg active:scale-95 transition-all text-left border-2 border-transparent hover:border-terra-sol" data-categoria="promocoes">
                    <div class="flex items-start justify-between mb-3">
                        <div class="w-12 h-12 bg-gradient-to-br from-terra-sol to-orange-600 rounded-xl flex items-center justify-center group-hover:scale-110 transition-transform">
                            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/>
                            </svg>
                        </div>
                        <span class="inline-flex items-center px-2 py-1 bg-orange-100 text-orange-700 text-xs font-bold rounded-full" id="badge-promocoes">0</span>
                    </div>
                    <h3 class="text-base font-bold text-slate-900 mb-1">Promoções</h3>
                    <p class="text-xs text-gray-600">Ofertas ativas na região</p>
                </button>

                <button id="card-servicos" class="card-utilidade group bg-white p-4 rounded-2xl shadow-sm hover:shadow-lg active:scale-95 transition-all text-left border-2 border-transparent hover:border-terra-sol" data-categoria="servicos">
                    <div class="flex items-start justify-between mb-3">
                        <div class="w-12 h-12 bg-gradient-to-br from-green-500 to-green-600 rounded-xl flex items-center justify-center group-hover:scale-110 transition-transform">
                            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                            </svg>
                        </div>
                        <span class="inline-flex items-center px-2 py-1 bg-green-100 text-green-700 text-xs font-bold rounded-full" id="badge-servicos">0</span>
                    </div>
                    <h3 class="text-base font-bold text-slate-900 mb-1">Serviços</h3>
                    <p class="text-xs text-gray-600">Profissionais disponíveis</p>
                </button>

                <button id="card-eventos" class="card-utilidade group bg-white p-4 rounded-2xl shadow-sm hover:shadow-lg active:scale-95 transition-all text-left border-2 border-transparent hover:border-terra-sol" data-categoria="eventos">
                    <div class="flex items-start justify-between mb-3">
                        <div class="w-12 h-12 bg-gradient-to-br from-purple-500 to-purple-600 rounded-xl flex items-center justify-center group-hover:scale-110 transition-transform">
                            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                            </svg>
                        </div>
                        <span class="inline-flex items-center px-2 py-1 bg-purple-100 text-purple-700 text-xs font-bold rounded-full" id="badge-eventos">0</span>
                    </div>
                    <h3 class="text-base font-bold text-slate-900 mb-1">Eventos</h3>
                    <p class="text-xs text-gray-600">O que rola no bairro</p>
                </button>

                <button id="card-avisos" class="card-utilidade group bg-white p-4 rounded-2xl shadow-sm hover:shadow-lg active:scale-95 transition-all text-left border-2 border-transparent hover:border-terra-sol" data-categoria="avisos">
                    <div class="flex items-start justify-between mb-3">
                        <div class="w-12 h-12 bg-gradient-to-br from-red-500 to-red-600 rounded-xl flex items-center justify-center group-hover:scale-110 transition-transform">
                            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                            </svg>
                        </div>
                        <span class="inline-flex items-center px-2 py-1 bg-red-100 text-red-700 text-xs font-bold rounded-full" id="badge-avisos">0</span>
                    </div>
                    <h3 class="text-base font-bold text-slate-900 mb-1">Avisos</h3>
                    <p class="text-xs text-gray-600">Alertas do seu bairro</p>
                </button>

            </div>
        </div>
    </section>

    <!-- ========================================
         ZONA 4: FEED FILTRADO POR INTENÇÃO
    ========================================= -->
    <section id="zona-feed" class="bg-gray-50 min-h-screen pb-24">

        <!-- Tab Switcher Fixo -->
        <div id="tabs-container" class="sticky top-[60px] z-40 bg-white border-b border-gray-200 shadow-sm">
            <div class="max-w-7xl mx-auto">
                <div class="flex overflow-x-auto scrollbar-hide">
                    <button class="tab-filtro flex-shrink-0 px-5 py-4 font-medium text-sm border-b-2 border-terra-sol text-terra-sol transition-colors" data-filtro="todos">
                        <span>Tudo</span>
                    </button>
                    <button class="tab-filtro flex-shrink-0 px-5 py-4 font-medium text-sm border-b-2 border-transparent text-gray-600 transition-colors" data-filtro="vagas">
                        <span>Oportunidades</span>
                        <span class="ml-1.5 inline-flex items-center px-2 py-0.5 bg-blue-100 text-blue-700 text-xs font-bold rounded-full tab-badge" data-badge="vagas">0</span>
                    </button>
                    <button class="tab-filtro flex-shrink-0 px-5 py-4 font-medium text-sm border-b-2 border-transparent text-gray-600 transition-colors" data-filtro="promocoes">
                        <span>Ofertas</span>
                        <span class="ml-1.5 inline-flex items-center px-2 py-0.5 bg-orange-100 text-orange-700 text-xs font-bold rounded-full tab-badge" data-badge="promocoes">0</span>
                    </button>
                    <button class="tab-filtro flex-shrink-0 px-5 py-4 font-medium text-sm border-b-2 border-transparent text-gray-600 transition-colors" data-filtro="avisos">
                        <span>Avisos</span>
                        <span class="ml-1.5 inline-flex items-center px-2 py-0.5 bg-red-100 text-red-700 text-xs font-bold rounded-full tab-badge" data-badge="avisos">0</span>
                    </button>
                    <button class="tab-filtro flex-shrink-0 px-5 py-4 font-medium text-sm border-b-2 border-transparent text-gray-600 transition-colors" data-filtro="servicos">
                        <span>Serviços</span>
                        <span class="ml-1.5 inline-flex items-center px-2 py-0.5 bg-green-100 text-green-700 text-xs font-bold rounded-full tab-badge" data-badge="servicos">0</span>
                    </button>
                    <button class="tab-filtro flex-shrink-0 px-5 py-4 font-medium text-sm border-b-2 border-transparent text-gray-600 transition-colors" data-filtro="eventos">
                        <span>Eventos</span>
                        <span class="ml-1.5 inline-flex items-center px-2 py-0.5 bg-purple-100 text-purple-700 text-xs font-bold rounded-full tab-badge" data-badge="eventos">0</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Container do Feed -->
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div id="lista-feed" class="space-y-4">

                <!-- Skeleton Loading -->
                <div id="skeleton-loader" class="hidden space-y-4">
                    <div class="bg-white rounded-2xl p-4 skeleton animate-pulse">
                        <div class="flex items-center gap-3 mb-4">
                            <div class="w-12 h-12 bg-gray-300 rounded-xl"></div>
                            <div class="flex-1">
                                <div class="h-4 bg-gray-300 rounded w-2/3 mb-2"></div>
                                <div class="h-3 bg-gray-300 rounded w-1/2"></div>
                            </div>
                        </div>
                        <div class="space-y-2">
                            <div class="h-3 bg-gray-300 rounded w-full"></div>
                            <div class="h-3 bg-gray-300 rounded w-5/6"></div>
                        </div>
                    </div>
                </div>

                <!-- Botão "Carregar Mais" -->
                <button id="btn-carregar-mais" class="w-full py-4 text-sm font-medium text-gray-600 hover:text-gray-900 transition-colors hidden">
                    Ver mais resultados
                </button>

            </div>
        </div>
    </section>

    <!-- ========================================
         SEÇÃO MAPA (Feature 4)
    ========================================= -->
    <section id="secao-mapa" class="hidden fixed inset-0 z-30 bg-white" style="top:0; bottom: 64px;">
        <!-- Header do mapa -->
        <div class="absolute top-0 left-0 right-0 z-20 bg-white/95 backdrop-blur-sm shadow-sm px-4 py-3 flex items-center gap-3">
            <button id="mapa-fechar" class="p-2 hover:bg-gray-100 rounded-full">
                <svg class="w-6 h-6 text-slate-900" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
            </button>
            <div>
                <h2 class="font-bold text-slate-900">Mapa do Bairro</h2>
                <p class="text-xs text-gray-500" id="mapa-bairro-nome">Mangabeira</p>
            </div>
        </div>
        <!-- Container do mapa -->
        <div id="mapa-container" class="w-full" style="margin-top: 60px; height: calc(100% - 60px);"></div>
    </section>

    <!-- ========================================
         SEÇÃO CHAT (Feature 5)
    ========================================= -->
    <section id="secao-chat" class="hidden fixed inset-0 z-30 bg-white" style="top:0; bottom: 64px;">
        <!-- Header do chat — lista de conversas -->
        <div id="chat-header-lista" class="bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between">
            <h2 class="text-lg font-bold text-slate-900">Mensagens</h2>
            <button id="chat-fechar" class="p-2 hover:bg-gray-100 rounded-full">
                <svg class="w-6 h-6 text-slate-900" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <!-- Header do chat — conversa aberta (oculto por padrão) -->
        <div id="chat-header" class="hidden bg-white border-b border-gray-200 px-4 py-3 flex items-center gap-3">
            <button id="chat-voltar" class="p-2 hover:bg-gray-100 rounded-full">
                <svg class="w-5 h-5 text-slate-900" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
            </button>
            <div class="w-10 h-10 rounded-full bg-terra-sol flex items-center justify-center text-white font-bold text-sm" id="chat-avatar-outro">
                ?
            </div>
            <div>
                <p class="font-semibold text-slate-900" id="chat-nome-outro">Usuário</p>
                <p class="text-xs text-green-500">Online</p>
            </div>
        </div>

        <!-- Lista de conversas -->
        <div id="lista-conversas" class="overflow-y-auto" style="height: calc(100% - 56px);"></div>

        <!-- View de conversa individual (oculta por padrão) -->
        <div id="conversa-view" class="hidden flex flex-col" style="height: calc(100% - 56px);">
            <!-- Mensagens -->
            <div id="chat-mensagens" class="flex-1 overflow-y-auto px-4 py-3 bg-gray-50"></div>

            <!-- Input de mensagem -->
            <div class="bg-white border-t border-gray-200 px-4 py-3 flex items-center gap-2">
                <input type="text" id="chat-input"
                    placeholder="Digite sua mensagem..."
                    class="flex-1 border border-gray-300 rounded-full px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-terra-sol">
                <button id="chat-enviar"
                    class="w-10 h-10 bg-terra-sol hover:bg-orange-600 text-white rounded-full flex items-center justify-center transition-colors active:scale-95">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                    </svg>
                </button>
            </div>
        </div>
    </section>

    <!-- ========================================
         ZONA 5: NAVEGAÇÃO INFERIOR (Bottom Nav)
    ========================================= -->
    <nav id="bottom-navigation" class="fixed bottom-0 left-0 right-0 z-50 bg-white border-t border-gray-200 shadow-2xl">
        <div class="max-w-7xl mx-auto">
            <div class="grid grid-cols-5 items-center h-16">
