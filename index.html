    <title>Gente da Feira</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-tab { border-bottom: 3px solid #CC0000; color: #CC0000; font-weight: bold; }
        .hidden { display: none; }

        .reaction-btn { transition: transform 0.2s; }

    </nav>
