<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gente da Feira</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-tab { border-bottom: 3px solid #CC0000; color: #CC0000; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-100 pb-20">

    <header class="bg-white p-4 shadow-sm sticky top-0 z-20">
        <h1 class="text-xl font-bold text-center text-red-700 uppercase tracking-widest">Gente da Feira</h1>
    </header>

    <nav class="flex bg-white border-b sticky top-[60px] z-10">
        <button onclick="mudarFeed('global')" id="tab-global" class="flex-1 py-3 active-tab">Feira Toda</button>
        <button onclick="mudarFeed('zona')" id="tab-zona" class="flex-1 py-3 text-gray-500">Meu Bairro</button>
    </nav>

    <section id="auth-screen" class="p-6 bg-white shadow-lg m-4 rounded-xl hidden">
        <h2 class="font-bold text-xl text-red-700 mb-4 text-center">Acesse a Rede</h2>
        <button onclick="loginGitHub()" class="w-full flex items-center justify-center gap-2 bg-black text-white py-3 rounded-lg font-bold mb-4 shadow-md">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.298 24 12c0-6.627-5.373-12-12-12"/></svg>
            Entrar com GitHub
        </button>
        <div class="relative py-2 mb-4 italic text-center text-xs text-gray-400">ou use seu e-mail</div>
        <input type="email" id="auth-email" placeholder="E-mail" class="w-full p-3 border rounded-lg mb-2 outline-none">
        <input type="password" id="auth-password" placeholder="Senha" class="w-full p-3 border rounded-lg mb-4 outline-none">
        <div class="flex gap-2">
            <button onclick="fazerLogin()" class="flex-1 bg-red-700 text-white py-3 rounded-lg font-bold">Entrar</button>
            <button onclick="fazerCadastro()" class="flex-1 border border-red-700 text-red-700 py-3 rounded-lg font-bold">Cadastrar</button>
        </div>
    </section>

    <section id="user-dashboard" class="p-6 bg-white shadow-lg m-4 rounded-xl hidden">
        <div class="flex justify-start mb-4">
            <button onclick="location.reload()" class="text-gray-400 text-sm flex items-center gap-1">← Voltar</button>
        </div>
        <div class="text-center mb-6">
            <div class="w-24 h-24 bg-red-50 rounded-full mx-auto mb-2 flex items-center justify-center text-3xl border-4 border-red-700 overflow-hidden relative">
                <img id="img-perfil" src="" class="hidden w-full h-full object-cover">
                <span id="emoji-perfil">👤</span>
            </div>
            <h2 id="dash-nome" class="font-bold text-2xl text-gray-800">Seu Nome</h2>
            <p id="dash-bairro" class="text-red-700 font-bold"></p>
        </div>
        <div class="border-t pt-4 space-y-4">
            <p class="text-sm text-gray-600 italic text-center" id="dash-bio">Sua bio aparecerá aqui...</p>
            <div id="dash-acoes" class="flex gap-2">
                <button onclick="abrirEdicaoPerfil()" class="flex-1 py-3 border border-red-700 text-red-700 rounded-lg font-bold">Editar Perfil</button>
                <button onclick="fazerLogout()" class="flex-1 py-3 bg-gray-800 text-white rounded-lg font-bold">Sair</button>
            </div>
        </div>
    </section>

    <section id="form-perfil" class="p-6 bg-white shadow-lg m-4 rounded-xl hidden">
        <h2 id="titulo-form-perfil" class="font-bold text-xl text-center mb-4">Seu Perfil</h2>
        <div class="space-y-4">
            <div class="bg-gray-50 p-3 rounded-lg border-2 border-dashed border-gray-300 text-center">
                <label class="block text-xs text-gray-500 mb-2 font-bold uppercase">Foto de Perfil</label>
                <input type="file" id="perfil-upload" accept="image/*" class="text-xs text-gray-600 w-full">
            </div>
            <input type="text" id="perfil-nome" placeholder="Nome Público" class="w-full p-3 border rounded-lg">
            <select id="perfil-bairro" class="w-full p-3 border rounded-lg">
                <option value="">Seu Bairro em Feira?</option>
                <option value="Centro">Centro</option>
                <option value="Tomba">Tomba</option>
                <option value="SIM">SIM</option>
                <option value="Cidade Nova">Cidade Nova</option>
                <option value="Campo Limpo">Campo Limpo</option>
            </select>
            <textarea id="perfil-bio" placeholder="Sua Bio" class="w-full p-3 border rounded-lg h-24"></textarea>
            <button onclick="salvarPerfil()" class="bg-red-700 text-white w-full py-3 rounded-lg font-bold shadow-lg">Salvar Perfil</button>
            <button onclick="gerenciarBotaoPerfil()" class="w-full text-gray-400 text-sm py-2">Cancelar</button>
        </div>
    </section>

    <section id="form-post" class="p-4 bg-white shadow-md m-4 rounded-lg hidden">
        <h2 class="font-bold mb-2 text-red-700 text-lg">📢 Novo Aviso</h2>
        <input type="text" id="post-author" readonly class="w-full p-2 border rounded mb-2 bg-gray-50 text-gray-500">
        <select id="post-zona" class="w-full p-2 border rounded mb-2">
            <option value="Centro">Centro</option>
            <option value="Tomba">Tomba</option>
            <option value="SIM">SIM</option>
            <option value="Cidade Nova">Cidade Nova</option>
        </select>
        <textarea id="post-content" placeholder="O que está acontecendo agora?" class="w-full p-2 border rounded mb-2 h-24 outline-none focus:border-red-500"></textarea>
        <button onclick="enviarPost()" class="bg-red-700 text-white w-full py-3 rounded font-bold shadow-lg">Publicar Agora</button>
        <button onclick="toggleForm()" class="w-full py-2 text-gray-500 text-sm mt-2">Cancelar</button>
    </section>

    <main id="feed-container" class="p-4 space-y-4"></main>

    <footer class="fixed bottom-0 w-full bg-white border-t flex justify-around p-3 z-20">
        <button onclick="location.reload()" class="flex flex-col items-center text-red-700">
            <span>🏠</span><span class="text-xs font-medium">Início</span>
        </button>
        <button onclick="abrirPostagem()" class="flex flex-col items-center text-gray-500">
            <span class="text-xl">➕</span><span class="text-xs font-medium">Avisar</span>
        </button>
        <button onclick="gerenciarBotaoPerfil()" class="flex flex-col items-center text-gray-500">
            <span class="text-xl">👤</span><span class="text-xs font-medium">Perfil</span>
        </button>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js?v=2.1"></script>
</body>
</html>
