<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#031c36">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gente da Feira | Sua comunidade local</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <script src="config.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        creme: '#fcfcfc',
                        marinho: '#031c36',
                        amarelo: '#FFD700',
                        escuro: '#111111',
                        cinza: '#E5E4D7'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-creme text-escuro min-h-screen font-sans pb-24">

    <header class="sticky top-0 bg-marinho text-white shadow-md z-50 p-4">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-lg font-black tracking-tighter uppercase italic">Gente da Feira</h1>
            <div id="auth-status"></div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">
        
        <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
            <button onclick="carregarFeed('Feira Toda')" class="btn-bairro flex-shrink-0 px-4 py-2 rounded-full border border-marinho bg-marinho text-white text-[10px] font-black uppercase tracking-widest transition-all">Feira Toda</button>
            <button onclick="carregarFeed('Tomba')" class="btn-bairro flex-shrink-0 px-4 py-2 rounded-full border border-cinza bg-white text-marinho text-[10px] font-black uppercase tracking-widest transition-all">Tomba</button>
            <button onclick="carregarFeed('Campo Limpo')" class="btn-bairro flex-shrink-0 px-4 py-2 rounded-full border border-cinza bg-white text-marinho text-[10px] font-black uppercase tracking-widest transition-all">Campo Limpo</button>
            <button onclick="carregarFeed('Centro')" class="btn-bairro flex-shrink-0 px-4 py-2 rounded-full border border-cinza bg-white text-marinho text-[10px] font-black uppercase tracking-widest transition-all">Centro</button>
        </div>

        <div id="feed" class="space-y-4">
            </div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-cinza p-4 z-50">
        <div class="max-w-md mx-auto flex justify-around items-center">
            <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="flex flex-col items-center gap-1">
                <span class="text-[10px] font-black uppercase tracking-tighter text-marinho">Início</span>
            </button>
            
            <button onclick="abrirModalPost()" class="bg-amarelo text-marinho p-4 rounded-full shadow-xl -mt-12 border-4 border-creme active:scale-90 transition-transform">
                <span class="text-xl font-bold">+</span>
            </button>

            <button onclick="abrirPerfil()" id="btn-perfil" class="flex flex-col items-center gap-1 opacity-60">
                <span class="text-[10px] font-black uppercase tracking-tighter text-marinho">Entrar</span>
            </button>
        </div>
    </nav>

    <dialog id="modal-post" class="w-full max-w-md rounded-t-3xl shadow-2xl p-0 mt-auto bg-creme backdrop:bg-marinho/80">
        <div class="p-6 space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-xs font-black uppercase tracking-[0.2em] text-marinho">Novo Aviso</h2>
                <button onclick="document.getElementById('modal-post').close()" class="text-gray-400 font-bold">FECHAR</button>
            </div>

            <form id="form-post" class="space-y-4">
                <input type="text" name="titulo" placeholder="TÍTULO DO AVISO" required class="w-full p-4 rounded-xl border border-cinza outline-none focus:border-marinho bg-white text-sm font-bold">
                
                <div class="grid grid-cols-2 gap-2">
                    <select name="categoria" required class="p-4 rounded-xl border border-cinza bg-white text-[10px] font-black uppercase">
                        <option value="UTILIDADE">UTILIDADE</option>
                        <option value="ALERTA">ALERTA</option>
                        <option value="EVENTO">EVENTO</option>
                        <option value="OPORTUNIDADE">OPORTUNIDADE</option>
                    </select>
                    <select name="bairro_alvo" required class="p-4 rounded-xl border border-cinza bg-white text-[10px] font-black uppercase">
                        <option value="Tomba">Tomba</option>
                        <option value="Campo Limpo">Campo Limpo</option>
                        <option value="Centro">Centro</option>
                    </select>
                </div>

                <textarea name="conteudo" rows="4" placeholder="O que está acontecendo em Feira?" required class="w-full p-4 rounded-xl border border-cinza outline-none focus:border-marinho bg-white text-sm leading-relaxed"></textarea>
                
                <button type="submit" class="w-full py-4 bg-marinho text-white rounded-xl text-xs font-black uppercase tracking-widest shadow-lg active:scale-95 transition-transform">Publicar Agora</button>
            </form>
        </div>
    </dialog>

    <dialog id="modal-perfil" class="w-full max-w-md rounded-t-3xl shadow-2xl p-0 mt-auto bg-creme backdrop:bg-marinho/80">
        
        <div id="view-perfil-mode" class="p-6 space-y-6">
            <div class="flex flex-col items-center text-center space-y-3">
                <div id="perfil-avatar" class="w-24 h-24 rounded-full bg-cinza border-4 border-white shadow-md overflow-hidden flex items-center justify-center">
                    <span class="text-gray-300 text-3xl">👤</span>
                </div>
                <div>
                    <h2 id="perfil-nome" class="text-xl font-black text-marinho uppercase tracking-tight font-serif">Carregando...</h2>
                    <p id="perfil-bairro" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">---</p>
                </div>
                <p id="perfil-bio" class="text-sm italic text-gray-600 max-w-[80%]">Sem biografia disponível.</p>
            </div>

            <div class="space-y-3 pt-4 border-t border-cinza/30">
                <button onclick="toggleEditMode()" class="w-full py-4 bg-marinho text-white rounded-xl text-xs font-black uppercase tracking-widest shadow-lg active:scale-95 transition-transform">
                    Editar Perfil
                </button>
                <button onclick="document.getElementById('modal-perfil').close()" class="w-full py-3 border border-cinza text-marinho rounded-xl text-[10px] font-black uppercase tracking-widest active:bg-cinza transition-colors">
                    Voltar para o Início
                </button>
            </div>
        </div>

        <form id="form-perfil" class="hidden p-6 space-y-4">
            <h3 class="text-[10px] font-black uppercase text-marinho mb-4 tracking-widest text-center">Configurações de Perfil</h3>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold uppercase mb-1 text-gray-400">Foto de Perfil</label>
                    <input type="file" id="edit-avatar-file" accept="image/*" class="w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-[10px] file:font-black file:uppercase file:bg-marinho file:text-white cursor-pointer">
                </div>
                
                <input type="text" id="edit-nome" placeholder="Seu Nome" required class="w-full p-4 rounded-xl border border-cinza outline-none focus:border-marinho bg-white text-sm">
                <input type="text" id="edit-whatsapp" placeholder="WhatsApp (ex: 75988887777)" class="w-full p-4 rounded-xl border border-cinza outline-none focus:border-marinho bg-white text-sm">
                
                <select id="edit-bairro" class="w-full p-4 rounded-xl border border-cinza bg-white text-[10px] font-black uppercase">
                    <option value="Tomba">Tomba</option>
                    <option value="Campo Limpo">Campo Limpo</option>
                    <option value="Centro">Centro</option>
                </select>

                <textarea id="edit-bio" rows="2" placeholder="Sua biografia..." class="w-full p-4 rounded-xl border border-cinza outline-none focus:border-marinho bg-white text-sm"></textarea>
            </div>
            
            <div class="pt-4 space-y-3">
                <button type="submit" class="w-full py-4 bg-marinho text-white rounded-xl text-xs font-black uppercase tracking-widest shadow-lg">Salvar Tudo</button>
                <button type="button" onclick="toggleEditMode()" class="w-full py-2 text-[10px] font-bold text-gray-400 uppercase tracking-widest">Cancelar Edição</button>
                <button type="button" onclick="logout()" class="w-full py-2 text-red-500 text-[10px] font-black uppercase opacity-60">Sair da Conta</button>
            </div>
        </form>
    </dialog>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('service-worker.js')
            .then(reg => console.log('PWA Sintonizado'))
            .catch(err => console.log('Erro PWA', err));
        });
      }
    </script>

</body>
</html>
