<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gente da Feira</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gente da Feira">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8B6D45"> <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                     'feira-bronze': '#8B6D45', // Cor da terra/artesanato
                        'feira-bege': '#F4F4EC',   // Fundo suave
                        'feira-marinho': '#1E3A5F', // Confiança e seriedade
                        'feira-preto': '#1A1A1A'
                    }
                }
            }
        }
    </script>
    <style>
        /* Estados ativos com a nova cor Bronze */
        .active-tab { border-bottom: 4px solid #8B6D45; color: #8B6D45; font-weight: 900; }
        .hidden { display: none; }
        .animate-fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        body { 
            background-color: #F4F4EC; /* Aplica o Bege no fundo */
            overflow-x: hidden; 
            touch-action: manipulation; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        #feed-container { position: relative; z-index: 10; }
        header { z-index: 40; }
        footer { z-index: 50; }

        input, select, textarea { font-size: 16px !important; }
    </style>
</head>
<body class="pb-24">

    <header class="bg-feira-bronze p-4 shadow-md sticky top-0 z-40 flex justify-between items-center border-b-2 border-feira-marinho">
        <div class="w-8"></div> 
        <h1 class="text-xl font-black text-white uppercase tracking-widest">Gente da Feira</h1>
        <button onclick="location.reload()" class="text-white text-xs active:rotate-180 transition-transform font-bold">🔄</button>
    </header>

    <nav id="feed-nav" class="flex bg-white border-b sticky top-[62px] z-30">
        <button onclick="mudarFeed('global')" id="tab-global" class="flex-1 py-3 active-tab">Feira Toda</button>
        <button onclick="mudarFeed('zona')" id="tab-zona" class="flex-1 py-3 text-gray-400 font-bold">Meu Bairro</button>
    </nav>

    <section id="auth-screen" class="hidden p-8 text-center animate-fade-in pt-20">
        <div class="mb-8">
            <h2 class="text-2xl font-black text-feira-marinho uppercase">BEM-VINDO!</h2>
            <p class="text-gray-500 text-sm">Acesse a rede oficial de Feira de Santana</p>
        </div>
        <div class="space-y-4 mb-6">
            <input type="email" id="auth-email" placeholder="Seu e-mail" class="w-full p-4 border-2 rounded-xl outline-none focus:ring-2 focus:ring-feira-bronze">
            <input type="password" id="auth-password" placeholder="Sua senha" class="w-full p-4 border-2 rounded-xl outline-none focus:ring-2 focus:ring-feira-bronze">
        </div>
        <div class="space-y-3">
            <button onclick="fazerLogin()" class="w-full bg-feira-bronze text-white py-4 rounded-xl font-black shadow-lg active:scale-95 transition">ENTRAR</button>
            <button onclick="fazerCadastro()" class="w-full border-2 border-feira-marinho text-feira-marinho py-4 rounded-xl font-black hover:bg-white active:scale-95 transition">CRIAR NOVA CONTA</button>
        </div>
    </section>

    <section id="user-dashboard" class="hidden p-4 animate-fade-in">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden mb-6 border border-gray-100">
            <div class="bg-gradient-to-r from-feira-marinho to-feira-bronze h-24"></div>
            <div class="px-6 pb-6 text-center -mt-12">
                <div class="inline-block p-1 bg-white rounded-full mb-4 shadow-md">
                    <div class="w-24 h-24 bg-gray-200 rounded-full flex items-center justify-center overflow-hidden border-4 border-white">
                        <img id="img-perfil" class="w-full h-full object-cover hidden">
                        <span id="emoji-perfil" class="text-4xl">👤</span>
                    </div>
                </div>
                <h2 id="dash-nome" class="text-xl font-bold text-feira-marinho uppercase">...</h2>
                <p id="dash-bairro" class="text-white font-black text-[10px] uppercase mb-4 bg-feira-bronze inline-block px-2 py-1 rounded"></p>
                <p id="dash-bio" class="text-gray-500 text-sm italic px-4 mb-6 leading-tight"></p>
                
                <div class="grid grid-cols-2 gap-4 border-t pt-6">
                    <div>
                        <p class="text-xl font-black text-feira-marinho" id="dash-count">0</p>
                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Avisos</p>
                    </div>
                    <div>
                        <p class="text-xl font-black text-feira-bronze">FSA</p>
                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Região</p>
                    </div>
                </div>
            </div>
        </div>
        <div id="dash-acoes" class="hidden space-y-2 mb-6">
            <button onclick="abrirEdicaoPerfil()" class="w-full bg-feira-preto text-white py-3 rounded-xl font-black text-xs uppercase tracking-widest active:scale-95 transition">Editar Perfil</button>
            <button onclick="fazerLogout()" class="w-full text-red-600 py-2 text-[10px] font-black uppercase tracking-widest">Sair da Conta</button>
        </div>
        <h3 class="font-black text-gray-400 text-[10px] uppercase mb-4 tracking-widest px-2">Histórico de Atividade</h3>
        <div id="historico-posts" class="space-y-3 px-2 pb-10"></div>
    </section>

    <section id="form-perfil" class="hidden p-6 bg-white min-h-screen animate-fade-in">
        <h2 class="text-xl font-black mb-6 text-feira-preto uppercase border-b-4 border-feira-bronze inline-block">Meu Perfil</h2>
        <div class="space-y-4">
            <div class="p-4 bg-gray-50 rounded-xl border-2 border-dashed border-gray-200 text-center">
                <p class="text-[10px] font-black text-gray-400 mb-2 uppercase">Alterar Foto</p>
                <input type="file" id="perfil-upload" accept="image/*" class="text-xs w-full">
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-black uppercase text-gray-400 ml-1">Nome ou Empresa</label>
                <input type="text" id="perfil-nome" class="w-full p-3 border-2 rounded-lg focus:ring-2 focus:ring-feira-bronze outline-none">
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-black uppercase text-gray-400 ml-1">Seu Bairro Principal</label>
                <select id="perfil-bairro" class="w-full p-3 border-2 rounded-lg focus:ring-2 focus:ring-feira-bronze outline-none font-bold">
                    </select>
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-black uppercase text-gray-400 ml-1">Bio / Descrição</label>
                <textarea id="perfil-bio" class="w-full p-3 border-2 rounded-lg h-24 focus:ring-2 focus:ring-feira-bronze outline-none"></textarea>
            </div>
            <button onclick="salvarPerfil()" class="w-full bg-feira-bronze text-white py-4 rounded-xl font-black shadow-lg active:scale-95 transition uppercase tracking-widest">SALVAR</button>
            <button onclick="window.mostrarTela('user-dashboard')" class="w-full py-2 text-gray-400 text-[10px] font-black uppercase">Voltar</button>
        </div>
    </section>

    <section id="form-post" class="hidden p-6 bg-white min-h-screen animate-fade-in">
        <h2 class="text-xl font-black mb-6 text-feira-preto uppercase italic border-b-4 border-feira-bronze inline-block">Novo Aviso</h2>
        <div class="space-y-4">
            <div class="space-y-1">
                <label class="text-[10px] font-black uppercase text-gray-400 ml-1">Onde está acontecendo?</label>
                <select id="post-zona" class="w-full p-3 border-2 rounded-lg bg-gray-50 font-black text-feira-preto">
                    </select>
            </div>
            <textarea id="post-content" placeholder="O que a cidade precisa saber agora?" class="w-full p-4 border-2 rounded-xl h-40 outline-none focus:ring-2 focus:ring-feira-bronze font-medium"></textarea>
            <button onclick="enviarPost()" class="bg-feira-bronze text-white w-full py-4 rounded-xl font-black shadow-lg text-lg active:scale-95 transition uppercase tracking-widest">PUBLICAR NO FEED</button>
            <button onclick="window.mostrarTela('feed-container')" class="w-full py-3 text-gray-400 text-[10px] font-black uppercase">Cancelar</button>
        </div>
    </section>

    <main id="feed-container" class="p-4 space-y-4 animate-fade-in min-h-screen"></main>

    <footer class="fixed bottom-0 w-full bg-white border-t-2 border-gray-100 flex justify-around p-3 z-50 shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
        <button onclick="window.mostrarTela('feed-container')" class="flex flex-col items-center text-feira-marinho">
            <span class="text-2xl">🏠</span><span class="text-[9px] font-black uppercase tracking-tighter">Início</span>
        </button>
        <button onclick="abrirPostagem()" class="flex flex-col items-center text-gray-300 hover:text-feira-bronze transition">
            <div class="bg-feira-bronze text-white w-10 h-10 rounded-full flex items-center justify-center -mt-6 shadow-lg border-4 border-white">
                <span class="text-xl">+</span>
            </div>
            <span class="text-[9px] font-black uppercase tracking-tighter mt-1">Avisar</span>
        </button>
        <button onclick="gerenciarBotaoPerfil()" class="flex flex-col items-center text-gray-300 hover:text-feira-marinho transition">
            <span class="text-2xl">👤</span><span class="text-[9px] font-black uppercase tracking-tighter">Perfil</span>
        </button>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
