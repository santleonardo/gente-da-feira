<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gente da Feira</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        .active-tab {
            color: #4f46e5;
            border-bottom: 3px solid #4f46e5;
            font-weight: 600;
        }
        body {
            background: linear-gradient(to bottom, #f8fafc 0%, #f1f5f9 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50">

    <!-- FEED PRINCIPAL -->
    <div id="feed-container" class="max-w-2xl mx-auto pb-20">
        <header class="bg-gradient-to-r from-indigo-600 to-indigo-700 text-white p-4 shadow-md sticky top-0 z-10">
            <h1 class="font-bold text-xl text-center tracking-tight">Gente da Feira</h1>
            <div class="flex justify-center gap-0 mt-3 bg-white/10 rounded-lg overflow-hidden">
                <button onclick="mudarFeed('global')" id="tab-global" class="flex-1 py-3 text-white text-sm active-tab transition-all">Feira Toda</button>
                <button onclick="mudarFeed('zona')" id="tab-zona" class="flex-1 py-3 text-white/70 text-sm transition-all">Meu Bairro</button>
            </div>
        </header>
    </div>

    <!-- TELA DE LOGIN/CADASTRO -->
    <section id="auth-screen" class="hidden max-w-md mx-auto p-6 mt-10">
        <div class="bg-white shadow-lg rounded-2xl p-8">
            <div class="text-center mb-6">
                <h1 class="text-3xl font-bold text-indigo-700 mb-2">Gente da Feira</h1>
                <p class="text-gray-500 text-sm">Conecte-se com sua cidade</p>
            </div>

            <h2 class="text-lg font-semibold mb-4 text-gray-700">Acesse a Rede</h2>
            
            <button onclick="loginGitHub()" class="w-full bg-gray-800 text-white py-3 rounded-lg font-medium mb-4 hover:bg-gray-900 transition-colors flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
                Entrar com GitHub
            </button>

            <div class="text-center text-gray-400 text-sm my-4">ou use seu e-mail</div>

            <input type="email" id="auth-email" placeholder="seu@email.com" class="w-full p-3 border border-gray-200 rounded-lg mb-3 outline-none focus:border-indigo-400 transition-colors">
            <input type="password" id="auth-password" placeholder="Senha" class="w-full p-3 border border-gray-200 rounded-lg mb-4 outline-none focus:border-indigo-400 transition-colors">
            
            <button id="btn-entrar" onclick="fazerLogin()" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold mb-2 hover:bg-indigo-700 transition-colors">Entrar</button>
            <button id="btn-cadastrar" onclick="fazerCadastro()" class="w-full text-indigo-600 py-2 text-sm font-medium hover:text-indigo-800 transition-colors">Cadastrar</button>
        </div>
    </section>

    <!-- DASHBOARD DO USUÁRIO -->
    <section id="user-dashboard" class="hidden max-w-md mx-auto p-6 mt-6">
        <div class="bg-white shadow-lg rounded-2xl p-6 mb-6">
            <button onclick="voltarParaFeed()" class="text-gray-400 hover:text-gray-600 mb-4 flex items-center gap-1 text-sm">
                ← Voltar
            </button>
            
            <div class="flex items-center gap-4 mb-6">
                <img id="img-perfil" src="" class="w-20 h-20 rounded-full border-4 border-indigo-200 object-cover hidden">
                <div id="emoji-perfil" class="w-20 h-20 rounded-full bg-indigo-100 flex items-center justify-center text-4xl">👤</div>
                
                <div class="flex-1">
                    <h2 id="dash-nome" class="font-bold text-xl text-gray-800">Seu Nome</h2>
                    <p id="dash-count" class="text-indigo-600 font-semibold text-sm">0 Avisos</p>
                    <p id="dash-bairro" class="text-gray-500 text-xs mt-1"></p>
                </div>
            </div>

            <p id="dash-bio" class="text-gray-600 text-sm mb-6 italic">Sua bio aparecerá aqui...</p>

            <div id="dash-acoes" class="flex gap-2">
                <button onclick="abrirEdicaoPerfil()" class="flex-1 bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition-colors">Editar Meu Perfil</button>
                <button onclick="fazerLogout()" class="bg-gray-200 text-gray-700 px-4 py-3 rounded-lg font-semibold hover:bg-gray-300 transition-colors">Sair</button>
            </div>
        </div>

        <div class="bg-white shadow-lg rounded-2xl p-6">
            <h3 class="font-bold text-gray-700 mb-4">Meus Avisos</h3>
            <div id="historico-posts" class="space-y-2"></div>
        </div>
    </section>

    <!-- FORMULÁRIO DE EDIÇÃO DE PERFIL -->
    <section id="form-perfil" class="hidden max-w-md mx-auto p-6 mt-6">
        <div class="bg-white shadow-lg rounded-2xl p-6">
            <h2 class="font-bold mb-6 text-indigo-700 text-xl">Seu Perfil</h2>
            
            <div class="mb-4 text-center">
                <div class="w-20 h-20 bg-indigo-100 rounded-full mx-auto flex items-center justify-center text-4xl mb-2">👤</div>
                <button class="text-xs text-indigo-600 hover:text-indigo-800">Alterar Foto</button>
            </div>

            <input type="text" id="perfil-nome" placeholder="Nome" class="w-full p-3 border border-gray-200 rounded-lg mb-3 outline-none focus:border-indigo-400">
            <select id="perfil-bairro" class="w-full p-3 border border-gray-200 rounded-lg mb-3 outline-none focus:border-indigo-400">
                <!-- Populado via JS -->
            </select>
            <textarea id="perfil-bio" placeholder="Sua Bio" class="w-full p-3 border border-gray-200 rounded-lg h-24 mb-4 outline-none focus:border-indigo-400"></textarea>
            
            <button id="btn-salvar-perfil" onclick="salvarPerfil()" class="bg-indigo-600 text-white w-full py-3 rounded-lg font-bold mb-2 hover:bg-indigo-700 transition-colors">Salvar</button>
            <button onclick="voltarParaFeed()" class="w-full text-gray-500 text-sm py-2 hover:text-gray-700 transition-colors">Cancelar</button>
        </div>
    </section>

    <!-- FORMULÁRIO DE NOVO POST -->
    <section id="form-post" class="hidden max-w-md mx-auto p-6 mt-6">
        <div class="bg-white shadow-lg rounded-2xl p-6">
            <h2 class="font-bold mb-4 text-indigo-700 text-xl flex items-center gap-2">
                📢 Novo Aviso
            </h2>
            
            <select id="post-zona" class="w-full p-3 border border-gray-200 rounded-lg mb-3 outline-none focus:border-indigo-400">
                <!-- Populado via JS -->
            </select>
            
            <textarea 
                id="post-content" 
                placeholder="O que está acontecendo no seu bairro?" 
                class="w-full p-3 border border-gray-200 rounded-lg h-32 mb-2 outline-none focus:border-indigo-400 resize-none"
                maxlength="500"
                oninput="atualizarContador()"></textarea>
            
            <div class="text-right mb-4">
                <span id="contador-caracteres" class="text-xs text-gray-400">0/500</span>
            </div>

            <button id="btn-publicar" onclick="enviarPost()" class="bg-indigo-600 text-white w-full py-3 rounded-lg font-bold shadow-md hover:bg-indigo-700 transition-colors mb-2">Publicar</button>
            <button onclick="voltarParaFeed()" class="w-full py-2 text-gray-500 text-sm hover:text-gray-700 transition-colors">Cancelar</button>
        </div>
    </section>

    <!-- BARRA DE NAVEGAÇÃO INFERIOR -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around py-3 shadow-lg z-20">
        <button onclick="voltarParaFeed()" class="flex flex-col items-center gap-1 text-gray-600 hover:text-indigo-600 transition-colors">
            <span class="text-2xl">🏠</span>
            <span class="text-[10px] font-medium">INÍCIO</span>
        </button>
        <button onclick="abrirPostagem()" class="flex flex-col items-center gap-1 text-gray-600 hover:text-indigo-600 transition-colors">
            <span class="text-2xl">➕</span>
            <span class="text-[10px] font-medium">AVISAR</span>
        </button>
        <button onclick="gerenciarBotaoPerfil()" class="flex flex-col items-center gap-1 text-gray-600 hover:text-indigo-600 transition-colors">
            <span class="text-2xl">👤</span>
            <span class="text-[10px] font-medium">PERFIL</span>
        </button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
