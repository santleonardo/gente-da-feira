<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gente da Feira | Hub FSA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { 'feira-yellow': '#FFD700', 'feira-bege': '#FDFDF7', 'feira-marinho': '#1E3A5F', 'feira-bronze': '#CD7F32' } } } }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #FDFDF7; }
        .hidden { display: none !important; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        button:active { transform: scale(0.95); transition: 0.1s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-gray-900 pb-24">

    <header class="bg-white border-b-2 border-gray-100 p-4 sticky top-0 z-50 flex justify-between items-center shadow-sm">
        <h1 class="font-black text-xl tracking-tighter text-feira-marinho">GENTE DA <span class="text-feira-yellow">FEIRA</span></h1>
        <button id="btn-sair" onclick="fazerLogout()" class="hidden text-[10px] font-black uppercase text-gray-300 hover:text-red-500 transition-colors">Sair</button>
    </header>

    <section id="auth-screen" class="hidden min-h-[80vh] flex flex-col justify-center px-6 animate-fade-in">
        <div class="bg-white p-8 rounded-3xl shadow-xl border border-gray-100">
            <h2 class="text-2xl font-black mb-2 text-feira-marinho">Bem-vindo à Feira!</h2>
            <p class="text-gray-400 text-sm mb-8 font-medium">Conecte-se com a cidade agora.</p>
            <input type="email" id="auth-email" placeholder="Seu e-mail" class="w-full p-4 rounded-2xl bg-gray-50 border-none mb-4 focus:ring-2 focus:ring-feira-yellow">
            <input type="password" id="auth-password" placeholder="Sua senha" class="w-full p-4 rounded-2xl bg-gray-50 border-none mb-6 focus:ring-2 focus:ring-feira-yellow">
            <div class="space-y-3">
                <button onclick="fazerLogin()" class="w-full bg-feira-marinho text-white py-4 rounded-2xl font-black uppercase shadow-lg">Entrar</button>
                <button onclick="fazerCadastro()" class="w-full text-feira-marinho py-2 text-xs font-bold uppercase tracking-widest">Criar conta nova</button>
            </div>
        </div>
    </section>

    <section id="form-post" class="hidden min-h-screen p-6 animate-fade-in">
        <div class="max-w-xl mx-auto bg-white rounded-3xl p-6 shadow-xl border border-gray-100">
            <textarea id="post-content" placeholder="O que está acontecendo no seu bairro?" class="w-full h-48 p-4 rounded-2xl bg-gray-50 border-none mb-4 focus:ring-2 focus:ring-feira-yellow resize-none text-lg"></textarea>
            
            <label class="text-[10px] font-black uppercase text-gray-400 ml-2">Publicar em:</label>
            <select id="post-bairro" class="w-full p-4 mt-1 rounded-2xl bg-gray-100 border-none font-bold text-feira-marinho mb-6">
                <option value="Geral">📍 Feira Toda (Geral)</option>
            </select>

            <button onclick="criarPostagem()" class="w-full bg-feira-yellow text-feira-marinho py-4 rounded-2xl font-black uppercase shadow-lg mb-3">Publicar Agora</button>
            <button onclick="irParaHome()" class="w-full text-gray-400 font-bold py-2 text-xs uppercase">Cancelar</button>
        </div>
    </section>

    <section id="edit-profile-screen" class="hidden min-h-screen p-6 animate-fade-in">
        <div class="max-w-xl mx-auto bg-white rounded-3xl p-8 shadow-xl border border-gray-100">
            <h2 class="text-xl font-black text-feira-marinho mb-8 uppercase tracking-tight">Configurações</h2>
            
            <div class="flex flex-col items-center mb-8">
                <label for="foto-upload" class="relative cursor-pointer group">
                    <div id="preview-avatar" class="w-28 h-28 rounded-full bg-gray-200 border-4 border-white shadow-xl overflow-hidden flex items-center justify-center bg-cover bg-center">
                        <span class="text-3xl">📸</span>
                    </div>
                </label>
                <input type="file" id="foto-upload" class="hidden" accept="image/*" onchange="processarFoto(event)">
                <p class="text-[10px] font-black text-gray-400 mt-4 uppercase tracking-widest">Toque na foto para mudar</p>
            </div>

            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-black uppercase text-gray-400 ml-2">Seu Nome/Apelido</label>
                    <input id="edit-username" type="text" class="w-full p-4 mt-1 rounded-2xl bg-gray-50 border-none font-bold text-feira-marinho">
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase text-gray-400 ml-2">Seu Bairro</label>
                    <select id="edit-bairro" class="w-full p-4 mt-1 rounded-2xl bg-gray-50 border-none font-bold text-feira-marinho"></select>
                </div>
                <button onclick="salvarPerfilCompleto()" class="w-full bg-feira-marinho text-white py-4 rounded-2xl font-black uppercase shadow-lg mt-4">Guardar Alterações</button>
                <button onclick="irParaHome()" class="w-full text-gray-400 py-2 text-[10px] font-bold uppercase">Cancelar</button>
            </div>
        </div>
    </section>

    <nav id="feed-tabs" class="hidden max-w-xl mx-auto px-4 pt-4 flex gap-2">
        <button onclick="mudarFeed('Geral')" id="tab-geral" class="flex-1 py-3 rounded-2xl font-black uppercase text-[10px] tracking-widest transition-all bg-feira-marinho text-white shadow-md">Feira Toda</button>
        <button onclick="mudarFeed('Local')" id="tab-local" class="flex-1 py-3 rounded-2xl font-black uppercase text-[10px] tracking-widest transition-all bg-white text-gray-400 border border-gray-100">Meu Bairro</button>
    </nav>

    <main id="feed-container" class="hidden p-4 space-y-4 min-h-screen max-w-xl mx-auto"></main>

    <footer id="main-nav" class="hidden fixed bottom-0 w-full bg-white border-t-2 border-gray-100 flex justify-around p-3 z-50 shadow-2xl">
        <button onclick="irParaHome()" class="text-2xl">🏠</button>
        <button onclick="abrirPostagem()" class="bg-feira-yellow w-14 h-14 rounded-full -mt-8 border-4 border-white shadow-xl flex items-center justify-center text-feira-marinho text-2xl font-bold">＋</button>
        <button onclick="mostrarPerfilProprio()" class="text-2xl">👤</button>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
