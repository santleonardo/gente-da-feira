<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#001F3F">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gente da Feira | Sua comunidade local</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <script src="config.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        creme: '#FDFCF0',
                        marinho: '#001F3F',
                        amarelo: '#FFD700',
                        escuro: '#111111',
                        cinza: '#E5E4D7'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-creme text-escuro min-h-screen font-sans">

    <header class="sticky top-0 bg-marinho text-white shadow-md z-50 p-4">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black tracking-tighter">GENTE DA <span class="text-amarelo">FEIRA</span></h1>
            <div id="auth-status">
                <button onclick="login()" class="bg-amarelo text-marinho px-3 py-1 rounded-md text-xs font-bold uppercase tracking-widest">Entrar</button>
            </div>
        </div>
    </header>

    <nav id="nav-bairros" class="p-4 overflow-x-auto flex gap-2 border-b border-cinza bg-white/50 backdrop-blur-md sticky top-0 z-10">
    <button onclick="filtrar('Feira Toda')" class="btn-bairro px-6 py-2 rounded-full bg-marinho text-white text-xs font-black uppercase tracking-tighter shadow-sm transition-all">Feira Toda</button>
    <button onclick="filtrar('Tomba')" class="btn-bairro px-6 py-2 rounded-full bg-white border border-cinza text-marinho text-xs font-black uppercase tracking-tighter shadow-sm transition-all">Tomba</button>
    <button onclick="filtrar('SIM')" class="btn-bairro px-6 py-2 rounded-full bg-white border border-cinza text-marinho text-xs font-black uppercase tracking-tighter shadow-sm transition-all">SIM</button>
    <button onclick="filtrar('Campo Limpo')" class="btn-bairro px-6 py-2 rounded-full bg-white border border-cinza text-marinho text-xs font-black uppercase tracking-tighter shadow-sm transition-all">Campo Limpo</button>
</nav>

    <main id="feed" class="max-w-md mx-auto p-4 space-y-4 pb-24">
        <div class="text-center py-10 opacity-50 font-bold uppercase text-[10px] tracking-widest">
            Carregando avisos de Feira...
        </div>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 bg-marinho text-white border-t border-white/10 p-2 z-40">
    <div class="max-w-md mx-auto grid grid-cols-3 items-end pb-2">
        
        <button onclick="location.reload()" class="flex flex-col items-center gap-1 mb-1">
            <div class="w-5 h-5 bg-amarelo rounded-sm shadow-[0_0_10px_rgba(255,215,0,0.3)]"></div>
            <span class="text-[10px] font-bold uppercase tracking-tighter">Início</span>
        </button>
        
        <div class="flex justify-center">
            <button onclick="document.getElementById('modal-post').showModal()" 
                class="relative -top-6 bg-amarelo text-marinho w-14 h-14 rounded-full flex items-center justify-center shadow-2xl border-4 border-creme active:scale-90 transition-transform">
                <span class="text-3xl font-bold">+</span>
            </button>
        </div>
        
       <button id="btn-perfil" onclick="document.getElementById('modal-perfil').showModal()" class="flex flex-col items-center gap-1 mb-1 opacity-60">
    <div class="w-5 h-5 bg-white rounded-sm"></div>
    <span class="text-[10px] font-bold uppercase tracking-tighter">Perfil</span>
</button>

    </div>
</footer>

    <dialog id="modal-post" class="rounded-2xl shadow-2xl p-0 w-full max-w-md bg-creme overflow-hidden backdrop:bg-marinho/60">
        <div class="bg-marinho p-4 flex justify-between items-center text-white">
            <h2 class="font-bold">Novo Aviso no Bairro</h2>
            <button onclick="document.getElementById('modal-post').close()" class="text-amarelo font-bold px-2 text-xl">×</button>
        </div>
        <form id="form-post" class="p-6 space-y-4">
            <div>
                <label class="block text-[10px] font-bold uppercase mb-1">Título</label>
                <input type="text" id="post-titulo" required placeholder="Ex: Vaga de Vendedor" class="w-full p-3 border border-cinza rounded-lg outline-none focus:border-marinho bg-white">
            </div>
            <div>
                <label class="block text-[10px] font-bold uppercase mb-1">Bairro</label>
                <select id="post-bairro" class="w-full p-3 border border-cinza rounded-lg bg-white outline-none">
                    <option value="Tomba">Tomba</option>
                    <option value="SIM">SIM</option>
                    <option value="Campo Limpo">Campo Limpo</option>
                    <option value="Centro">Centro</option>
                    <option value="Feira Toda">Feira Toda</option>
                </select>
            </div>
            <div>
                <label class="block text-[10px] font-bold uppercase mb-1">O que está acontecendo?</label>
                <textarea id="post-conteudo" required rows="4" placeholder="Descreva os detalhes..." class="w-full p-3 border border-cinza rounded-lg outline-none focus:border-marinho bg-white"></textarea>
            </div>
            <button type="submit" class="w-full bg-amarelo text-marinho py-4 rounded-xl font-black uppercase tracking-widest shadow-lg active:bg-white transition-colors">Publicar Agora</button>
        </form>
    </dialog>
    <dialog id="modal-perfil" class="rounded-2xl shadow-2xl p-0 w-full max-w-md bg-creme overflow-hidden backdrop:bg-marinho/60">
    <div class="bg-marinho p-6 text-white text-center relative">
        <button onclick="document.getElementById('modal-perfil').close()" class="absolute right-4 top-4 text-amarelo font-bold text-xl">×</button>
        <div class="w-20 h-20 bg-amarelo rounded-full mx-auto mb-3 flex items-center justify-center border-4 border-white/20">
            <span id="perfil-inicial" class="text-3xl font-black text-marinho uppercase">-</span>
        </div>
        <h2 id="perfil-nome-display" class="font-bold text-xl">Vizinho Novo</h2>
        <p id="perfil-email" class="text-xs opacity-70 italic font-light"></p>
    </div>
    
    <form id="form-perfil" class="p-6 space-y-4">
        <div>
            <label class="block text-[10px] font-bold uppercase mb-1 text-gray-400">Nome Completo</label>
            <input type="text" id="edit-nome" required placeholder="Como quer ser chamado?" class="w-full p-3 border border-cinza rounded-lg outline-none focus:border-marinho bg-white text-sm">
        </div>
        
        <div>
            <label class="block text-[10px] font-bold uppercase mb-1 text-gray-400">Seu Bairro em Feira</label>
            <select id="edit-bairro" class="w-full p-3 border border-cinza rounded-lg bg-white outline-none text-sm">
                <option value="Tomba">Tomba</option>
                <option value="SIM">SIM</option>
                <option value="Campo Limpo">Campo Limpo</option>
                <option value="Centro">Centro</option>
                <option value="Outro">Outro</option>
            </select>
        </div>

        <div>
            <label class="block text-[10px] font-bold uppercase mb-1 text-gray-400">WhatsApp (Para contatos nos avisos)</label>
            <input type="tel" id="edit-whatsapp" placeholder="75 99999-9999" class="w-full p-3 border border-cinza rounded-lg outline-none focus:border-marinho bg-white text-sm">
        </div>

        <div class="pt-2 space-y-3">
            <button type="submit" class="w-full py-3 bg-amarelo text-marinho rounded-xl text-xs font-black uppercase tracking-widest shadow-md active:scale-95 transition-transform">
                Salvar Meu Perfil
            </button>
            <button type="button" onclick="logout()" class="w-full py-3 text-red-500 text-[10px] font-black uppercase tracking-widest opacity-60">
                Sair da Conta
            </button>
        </div>
    </form>
</dialog>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('service-worker.js')
            .then(reg => console.log('PWA: Service Worker ativo!'))
            .catch(err => console.log('PWA: Erro no registro', err));
        });
      }
    </script>

</body>
</html>
