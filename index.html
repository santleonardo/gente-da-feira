<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gente da Feira</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#CC0000">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-tab { border-bottom: 3px solid #CC0000; color: #CC0000; font-weight: bold; }
        .hidden { display: none; }
        .animate-fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .reaction-btn { transition: transform 0.2s; cursor: pointer; }
        .reaction-btn:active { transform: scale(1.4); }
    </style>
</head>
<body class="bg-gray-100 pb-24">

    <header class="bg-white p-4 shadow-sm sticky top-0 z-20 flex justify-between items-center">
        <div class="w-8"></div> <h1 class="text-xl font-bold text-red-700 uppercase tracking-widest">Gente da Feira</h1>
        <button onclick="location.reload()" class="text-gray-400 text-xs">🔄</button>
    </header>

    <nav id="feed-nav" class="flex bg-white border-b sticky top-[60px] z-10">
        <button onclick="mudarFeed('global')" id="tab-global" class="flex-1 py-3 active-tab">Feira Toda</button>
        <button onclick="mudarFeed('zona')" id="tab-zona" class="flex-1 py-3 text-gray-500">Meu Bairro</button>
    </nav>

    <section id="auth-screen" class="hidden p-8 text-center animate-fade-in">
        <div class="mb-8">
            <h2 class="text-2xl font-black text-gray-800">BEM-VINDO!</h2>
            <p class="text-gray-500 text-sm">Acesse a rede oficial de Feira de Santana</p>
        </div>
        
        <div class="space-y-4 mb-6">
            <input type="email" id="auth-email" placeholder="Seu e-mail" class="w-full p-4 border rounded-xl outline-none focus:ring-2 focus:ring-red-600">
            <input type="password" id="auth-password" placeholder="Sua senha" class="w-full p-4 border rounded-xl outline-none focus:ring-2 focus:ring-red-600">
        </div>

        <div class="space-y-3">
            <button onclick="fazerLogin()" class="w-full bg-red-700 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-red-800 transition">Entrar</button>
            <button onclick="fazerCadastro()" class="w-full border-2 border-red-700 text-red-700 py-4 rounded-xl font-bold hover:bg-red-50 transition">Criar Nova Conta</button>
        </div>
        <p class="mt-8 text-[10px] text-gray-400 uppercase tracking-tighter">Ao entrar, você concorda com os termos da comunidade.</p>
    </section>

    <section id="user-dashboard" class="hidden p-4 animate-fade-in">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden mb-6">
            <div class="bg-red-700 h-24"></div>
            <div class="px-6 pb-6 text-center -mt-12">
                <div class="inline-block p-1 bg-white rounded-full mb-4">
                    <div class="w-24 h-24 bg-gray-200 rounded-full flex items-center justify-center overflow-hidden border-4 border-white shadow-inner">
                        <img id="img-perfil" class="w-full h-full object-cover hidden">
                        <span id="emoji-perfil" class="text-4xl">👤</span>
                    </div>
                </div>
                <h2 id="dash-nome" class="text-xl font-bold text-gray-800">Carregando...</h2>
                <p id="dash-bairro" class="text-red-600 font-bold text-xs uppercase mb-4"></p>
                <p id="dash-bio" class="text-gray-500 text-sm italic px-4 mb-6"></p>
                
                <div class="grid grid-cols-2 gap-4 border-t pt-6">
                    <div>
                        <p class="text-xl font-black text-gray-800" id="dash-count">0</p>
                        <p class="text-[10px] text-gray-400 font-bold uppercase">Avisos</p>
                    </div>
                    <div>
                        <p class="text-xl font-black text-gray-800">FSA</p>
                        <p class="text-[10px] text-gray-400 font-bold uppercase">Região</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="dash-acoes" class="hidden space-y-2 mb-6">
            <button onclick="abrirEdicaoPerfil()" class="w-full bg-gray-100 text-gray-700 py-3 rounded-lg font-bold text-sm">Editar Perfil</button>
            <button onclick="fazerLogout()" class="w-full text-red-600 py-2 text-xs font-bold">Sair da Conta</button>
        </div>

        <h3 class="font-black text-gray-400 text-[10px] uppercase mb-4 tracking-widest px-2">Meus Últimos Avisos</h3>
        <div id="historico-posts" class="space-y-3"></div>
    </section>

    <section id="form-perfil" class="hidden p-6 bg-white min-h-screen animate-fade-in">
        <h2 class="text-xl font-bold mb-6 text-red-700">Configurar Perfil</h2>
        <div class="space-y-4">
            <div>
                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Foto de Perfil</label>
                <input type="file" id="perfil-upload" accept="image/*" class="w-full text-sm">
            </div>
            <input type="text" id="perfil-nome" placeholder="Seu Nome ou Nome da Empresa" class="w-full p-3 border rounded-lg">
            <select id="perfil-bairro" class="w-full p-3 border rounded-lg">
                <option value="Centro">Centro</option>
                <option value="Tomba">Tomba</option>
                <option value="SIM">SIM</option>
                <option value="Cidade Nova">Cidade Nova</option>
                <option value="Campo Limpo">Campo Limpo</option>
                <option value="Humildes">Humildes</option>
                <option value="Mangabeira">Mangabeira</option>
            </select>
            <textarea id="perfil-bio" placeholder="Sua bio (ex: 'Pizzaria no Tomba')" class="w-full p-3 border rounded-lg h-24"></textarea>
            <button onclick="salvarPerfil()" class="w-full bg-red-700 text-white py-4 rounded-xl font-bold shadow-lg">Salvar Perfil</button>
            <button onclick="window.mostrarTela('user-dashboard')" class="w-full py-2 text-gray-500 text-sm">Voltar</button>
        </div>
    </section>

    <section id="form-post" class="hidden p-6 bg-white min-h-screen animate-fade-in">
        <h2 class="text-xl font-bold mb-6 text-red-700 italic">Novo Aviso</h2>
        <select id="post-zona" class="w-full p-3 border rounded-lg mb-4 bg-gray-50 font-bold text-red-700">
            <option value="Geral">Toda a Feira (Geral)</option>
            <option value="Centro">Centro</option>
            <option value="Tomba">Tomba</option>
            <option value="SIM">SIM</option>
            <option value="Cidade Nova">Cidade Nova</option>
            <option value="Campo Limpo">Campo Limpo</option>
            <option value="Humildes">Humildes</option>
            <option value="Mangabeira">Mangabeira</option>
        </select>
        <textarea id="post-content" placeholder="O que está acontecendo agora em Feira?" class="w-full p-4 border rounded-xl mb-4 h-40 outline-none focus:ring-2 focus:ring-red-600"></textarea>
        <button onclick="enviarPost()" class="bg-red-700 text-white w-full py-4 rounded-xl font-bold shadow-lg text-lg">Publicar Aviso</button>
        <button onclick="toggleForm()" class="w-full py-3 text-gray-400 text-sm mt-2">Cancelar e Voltar</button>
    </section>

    <main id="feed-container" class="p-4 space-y-4 animate-fade-in"></main>

    <footer class="fixed bottom-0 w-full bg-white border-t flex justify-around p-3 z-20 shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
        <button onclick="window.toggleForm()" class="flex flex-col items-center text-red-700">
            <span class="text-xl">🏠</span><span class="text-[10px] font-bold uppercase">Início</span>
        </button>
        <button onclick="abrirPostagem()" class="flex flex-col items-center text-gray-400 hover:text-red-700 transition">
            <span class="text-xl">➕</span><span class="text-[10px] font-bold uppercase">Avisar</span>
        </button>
        <button onclick="gerenciarBotaoPerfil()" class="flex flex-col items-center text-gray-400 hover:text-red-700 transition">
            <span class="text-xl">👤</span><span class="text-[10px] font-bold uppercase">Perfil</span>
        </button>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
