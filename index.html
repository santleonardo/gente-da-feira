<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gente da Feira | Hub FSA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'feira-yellow': '#FFD700', 
                        'feira-bege': '#FDFDF7',   
                        'feira-marinho': '#1E3A5F',
                        'feira-bronze': '#CD7F32'
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #FDFDF7; }
        .hidden { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-gray-900 pb-20">

    <header class="bg-white border-b-2 border-gray-100 sticky top-0 z-40 p-4 flex justify-between items-center shadow-sm">
        <h1 class="font-black text-xl tracking-tighter text-feira-marinho uppercase">Gente da <span class="text-feira-yellow">Feira</span></h1>
    </header>

    <section id="auth-screen" class="min-h-[80vh] flex flex-col items-center justify-center p-6">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-sm border-t-8 border-feira-yellow">
            <div class="text-center mb-6">
                <span class="text-4xl">☀️</span>
                <h2 class="text-2xl font-black mt-2 uppercase tracking-tighter text-feira-marinho">Conectar</h2>
            </div>
            <div class="space-y-4">
                <input type="email" id="auth-email" placeholder="E-mail" class="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-feira-yellow border-none">
                <input type="password" id="auth-password" placeholder="Senha" class="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-feira-yellow border-none">
                <button onclick="tentarLogar()" id="btn-login" class="w-full bg-feira-marinho text-white py-4 rounded-2xl font-black uppercase shadow-lg active:scale-95 transition-all">Entrar</button>
                <button onclick="tentarCadastrar()" class="w-full text-gray-400 py-2 text-xs font-bold uppercase tracking-widest text-center">Criar Conta</button>
            </div>
        </div>
    </section>

    <section id="form-post" class="hidden fixed inset-0 bg-feira-marinho/95 z-[60] p-6 flex flex-col items-center justify-center">
        <div class="bg-white w-full max-w-lg rounded-[2.5rem] p-8 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-black text-feira-marinho uppercase tracking-widest">Novo Aviso</h3>
                <button onclick="mostrarTela('feed-container')" class="text-gray-400 text-3xl">&times;</button>
            </div>
            <select id="post-zona" class="w-full p-4 mb-4 bg-gray-50 rounded-2xl border-none outline-none font-bold text-feira-marinho"></select>
            <textarea id="post-content" placeholder="O que está acontecendo no bairro?" class="w-full h-40 p-4 bg-gray-50 rounded-2xl border-none outline-none resize-none mb-4" maxlength="300"></textarea>
            <button onclick="enviarPost()" class="w-full bg-feira-yellow text-feira-marinho py-4 rounded-2xl font-black uppercase shadow-lg active:scale-95 transition-all">Publicar Agora</button>
        </div>
    </section>

    <section id="user-dashboard" class="hidden p-4 max-w-xl mx-auto space-y-6">
    <div class="bg-white p-8 rounded-[2.5rem] shadow-xl text-center border-t-8 border-feira-yellow relative">
        <button onclick="fazerLogout()" class="absolute top-6 right-6 text-red-400 font-black text-[10px] uppercase">Sair</button>
        <div class="w-24 h-24 bg-gray-100 rounded-[2rem] mx-auto mb-4 flex items-center justify-center overflow-hidden border-4 border-feira-bege shadow-inner text-3xl">
            <img id="img-perfil" src="" class="w-full h-full object-cover hidden">
            <span id="avatar-fallback">👤</span>
        </div>
        <h2 id="dash-nome" class="text-2xl font-black text-feira-marinho uppercase tracking-tighter"></h2>
        <p id="dash-bairro" class="text-gray-400 font-bold text-xs uppercase tracking-widest"></p>
        <p id="dash-bio" class="mt-4 text-gray-500 text-sm"></p>
        
        <div id="edit-button-area"></div>

        <div class="mt-6 flex justify-center gap-8 border-t pt-6">
            <div><span id="dash-count" class="block font-black text-xl">0</span><small class="text-[9px] font-black text-gray-400 uppercase">Avisos</small></div>
        </div>
    </div>
    <div id="historico-posts" class="space-y-4"></div>
</section>
    <section id="edit-profile-screen" class="hidden fixed inset-0 bg-white z-[80] p-6 overflow-y-auto">
    <div class="max-w-xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h3 class="font-black text-feira-marinho uppercase tracking-widest text-sm">Editar Minha Identidade</h3>
            <button onclick="mostrarTela('user-dashboard')" class="text-gray-400 text-2xl">&times;</button>
        </div>

        <div class="space-y-6">
            <div class="flex flex-col items-center gap-4 mb-8">
                <div onclick="document.getElementById('input-file').click()" class="w-24 h-24 rounded-[2rem] bg-gray-100 border-4 border-dashed border-gray-200 flex items-center justify-center cursor-pointer overflow-hidden relative group">
                    <span class="text-xs font-black text-gray-400 group-hover:hidden">Mudar Foto</span>
                    <div class="hidden group-hover:flex absolute inset-0 bg-feira-yellow/20 items-center justify-center text-xl">📸</div>
                </div>
                <input type="file" id="input-file" class="hidden" accept="image/*" onchange="previewImagem(event)">
            </div>

            <div>
                <label class="text-[10px] font-black uppercase text-gray-400 ml-4">Nome de Exibição</label>
                <input type="text" id="edit-username" class="w-full p-4 bg-gray-50 rounded-2xl border-none outline-none font-bold text-feira-marinho mt-1">
            </div>

            <div>
                <label class="text-[10px] font-black uppercase text-gray-400 ml-4">Meu Bairro em Feira</label>
                <select id="edit-bairro" class="w-full p-4 bg-gray-50 rounded-2xl border-none outline-none font-bold text-feira-marinho mt-1">
                    </select>
            </div>

            <div>
                <label class="text-[10px] font-black uppercase text-gray-400 ml-4">Biografia / O que eu faço</label>
                <textarea id="edit-bio" class="w-full h-24 p-4 bg-gray-50 rounded-2xl border-none outline-none resize-none mt-1 font-medium text-sm"></textarea>
            </div>

            <button id="btn-save-profile" onclick="salvarPerfilCompleto()" class="w-full bg-feira-marinho text-white py-4 rounded-2xl font-black uppercase shadow-lg active:scale-95 transition-all">Guardar Alterações</button>
        </div>
    </div>
</section>
    <nav id="feed-tabs" class="hidden max-w-xl mx-auto px-4 pt-4 flex gap-2">
    <button onclick="mudarFeed('Geral')" id="tab-geral" class="flex-1 py-3 rounded-2xl font-black uppercase text-[10px] tracking-widest transition-all bg-feira-marinho text-white shadow-md">
        Feira Toda
    </button>
    <button onclick="mudarFeed('Local')" id="tab-local" class="flex-1 py-3 rounded-2xl font-black uppercase text-[10px] tracking-widest transition-all bg-white text-gray-400 border border-gray-100">
        Meu Bairro
    </button>
</nav>

<main id="feed-container" class="hidden p-4 space-y-4 min-h-screen max-w-xl mx-auto"></main>

    <footer id="main-nav" class="hidden fixed bottom-0 w-full bg-white border-t-2 border-gray-100 flex justify-around p-3 z-50 shadow-2xl">
        <button onclick="mudarFeed('Geral')" class="text-2xl">🏠</button>
        <button onclick="abrirPostagem()" class="bg-feira-yellow w-14 h-14 rounded-2xl font-black -mt-10 border-4 border-white shadow-xl flex items-center justify-center text-feira-marinho text-2xl">+</button>
        <button onclick="gerenciarBotaoPerfil()" class="text-2xl">👤</button>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
