<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gente da Feira | O Hub de Feira de Santana</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FFD700">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'feira-yellow': '#FFD700', // Amarelo Vibrante (Ouro)
                        'feira-bege': '#FDFDF7',   // Fundo quase branco
                        'feira-marinho': '#1E3A5F', // Institucional/Confiança
                        'feira-preto': '#1A1A1A'
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #FDFDF7; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        /* Ajuste para o anel de foco no amarelo */
        .focus-yellow:focus { ring: 2px solid #FFD700; }
    </style>
</head>
<body class="text-gray-900 pb-20">

    <header class="bg-white border-b-2 border-gray-100 sticky top-0 z-40 p-4 flex justify-between items-center shadow-sm">
        <h1 class="font-black text-xl tracking-tighter text-feira-marinho underline decoration-feira-yellow decoration-4">GENTE DA <span class="text-feira-marinho">FEIRA</span></h1>
        <div class="flex gap-2">
            <button onclick="mudarFeed('geral')" class="text-[10px] font-black uppercase px-3 py-1 bg-gray-100 rounded-full hover:bg-feira-yellow transition">Geral</button>
            <button onclick="mudarFeed('bairro')" class="text-[10px] font-black uppercase px-3 py-1 bg-feira-marinho text-white rounded-full shadow-sm">Meu Bairro</button>
        </div>
    </header>

    <section id="auth-screen" class="hidden min-h-[80vh] flex flex-col items-center justify-center p-6">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm border-t-8 border-feira-yellow">
            <div class="text-center mb-6">
                <span class="text-4xl">☀️</span>
                <h2 class="text-2xl font-black mt-2">BEM-VINDO</h2>
            </div>
            <input type="email" id="auth-email" placeholder="E-mail" class="w-full p-4 mb-3 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-feira-yellow transition-all border-none">
            <input type="password" id="auth-password" placeholder="Senha" class="w-full p-4 mb-6 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-feira-yellow transition-all border-none">
            <button onclick="fazerLogin()" class="w-full bg-feira-marinho text-white py-4 rounded-2xl font-black uppercase mb-3 shadow-lg hover:bg-black transition">Entrar</button>
            <button onclick="fazerCadastro()" class="w-full text-gray-400 py-2 text-xs font-bold uppercase hover:text-feira-marinho">Criar Nova Conta</button>
        </div>
    </section>

    <section id="form-post" class="hidden p-4 animate-fade-in">
        <div class="bg-white rounded-3xl p-6 shadow-lg border-2 border-gray-50">
            <h2 class="font-black text-lg mb-4 text-feira-marinho uppercase tracking-tight">O que está rolando em Feira?</h2>
            <select id="post-zona" class="w-full p-3 mb-4 bg-gray-50 rounded-xl border-none font-bold text-sm text-gray-500 outline-none focus:ring-2 focus:ring-feira-yellow"></select>
            <textarea id="post-content" rows="6" placeholder="Compartilhe avisos, ofertas ou utilidade pública..." class="w-full p-4 bg-gray-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-feira-yellow mb-4 resize-none"></textarea>
            <button onclick="enviarPost()" class="w-full bg-feira-marinho text-white py-4 rounded-2xl font-black uppercase shadow-lg border-b-4 border-feira-yellow active:border-b-0 transition-all">Publicar Agora</button>
            <button onclick="mostrarTela('feed-container')" class="w-full py-3 text-gray-400 text-[10px] font-black uppercase mt-2">Voltar ao Início</button>
        </div>
    </section>

    <section id="user-dashboard" class="hidden p-4 animate-fade-in">
        <div class="bg-white rounded-3xl p-6 shadow-lg border-t-8 border-feira-yellow mb-6">
            <div class="flex items-center gap-4 mb-6">
                <div class="w-20 h-20 bg-feira-yellow rounded-full overflow-hidden flex items-center justify-center border-4 border-white shadow-md">
                    <img id="img-perfil" src="" class="w-full h-full object-cover hidden">
                    <span id="emoji-perfil" class="text-3xl">👤</span>
                </div>
                <div>
                    <h2 id="dash-nome" class="font-black text-xl leading-tight">Carregando...</h2>
                    <p id="dash-bairro" class="text-[10px] bg-feira-marinho text-white px-2 py-0.5 rounded-full font-black uppercase inline-block"></p>
                    <p id="dash-bio" class="text-sm text-gray-400 mt-1 italic"></p>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-feira-bege border border-gray-100 p-4 rounded-2xl text-center">
                    <span id="dash-count" class="block font-black text-2xl text-feira-marinho">0</span>
                    <span class="text-[9px] font-black uppercase text-gray-400 tracking-widest">Avisos</span>
                </div>
                <div id="dash-acoes" class="flex flex-col gap-2">
                    <button onclick="mostrarTela('form-perfil')" class="bg-gray-900 text-white py-3 rounded-xl text-[10px] font-black uppercase tracking-wider hover:bg-feira-yellow hover:text-black transition">Editar Perfil</button>
                    <button onclick="fazerLogout()" class="bg-red-50 text-red-500 py-3 rounded-xl text-[10px] font-black uppercase">Sair</button>
                </div>
            </div>
            <h3 class="font-black text-xs uppercase mb-4 text-gray-300 border-b pb-2">Meu Histórico</h3>
            <div id="historico-posts" class="space-y-3"></div>
        </div>
    </section>

    <section id="form-perfil" class="hidden p-4 animate-fade-in">
        <div class="bg-white rounded-3xl p-6 shadow-lg border-b-8 border-feira-yellow">
            <h2 class="font-black text-lg mb-6 uppercase tracking-tight">Atualizar Cadastro</h2>
            <div class="mb-4">
                <label class="text-[9px] font-black uppercase text-gray-400 mb-1 block">Foto do Morador</label>
                <input type="file" id="perfil-upload" class="text-xs w-full p-2 bg-gray-50 rounded-lg file:bg-feira-yellow file:border-none file:rounded-full file:px-4 file:font-black file:text-[9px]">
            </div>
            <input type="text" id="perfil-nome" placeholder="Seu nome" class="w-full p-4 mb-3 bg-gray-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-feira-yellow">
            <select id="perfil-bairro" class="w-full p-4 mb-3 bg-gray-50 rounded-2xl border-none outline-none font-bold text-sm focus:ring-2 focus:ring-feira-yellow"></select>
            <textarea id="perfil-bio" placeholder="Conte um pouco sobre você..." class="w-full p-4 mb-6 bg-gray-50 rounded-2xl border-none outline-none resize-none focus:ring-2 focus:ring-feira-yellow"></textarea>
            <button id="btn-save-perfil" onclick="salvarPerfil()" class="w-full bg-feira-marinho text-white py-4 rounded-2xl font-black uppercase shadow-lg active:scale-95 transition">Salvar Perfil</button>
            <button onclick="mostrarTela('user-dashboard')" class="w-full py-3 text-gray-400 text-[10px] font-black uppercase mt-2">Cancelar</button>
        </div>
    </section>

    <main id="feed-container" class="p-4 space-y-4 animate-fade-in min-h-screen"></main>

    <footer class="fixed bottom-0 w-full bg-white border-t-2 border-gray-100 flex justify-around p-3 z-50 shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
        <button onclick="mostrarTela('feed-container')" class="flex flex-col items-center text-feira-marinho group">
            <span class="text-2xl group-hover:scale-110 transition">🏠</span>
            <span class="text-[9px] font-black uppercase tracking-tighter">Início</span>
        </button>
        <button onclick="abrirPostagem()" class="flex flex-col items-center group">
            <div class="bg-feira-yellow text-feira-marinho w-14 h-14 rounded-full flex items-center justify-center -mt-10 shadow-xl border-4 border-white group-hover:rotate-180 transition-transform duration-500">
                <span class="text-3xl font-black">+</span>
            </div>
            <span class="text-[9px] font-black uppercase tracking-tighter mt-1 text-feira-marinho">Postar</span>
        </button>
        <button onclick="gerenciarBotaoPerfil()" class="flex flex-col items-center text-gray-300 hover:text-feira-marinho transition group">
            <span class="text-2xl group-hover:scale-110 transition">👤</span>
            <span class="text-[9px] font-black uppercase tracking-tighter">Perfil</span>
        </button>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>

</body>
</html>
