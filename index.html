<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#001F3F">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gente da Feira | Sua comunidade local</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <script src="config.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        creme: '#FDFCF0',
                        marinho: '#001F3F',
                        amarelo: '#FFD700',
                        escuro: '#111111',
                        cinza: '#E5E4D7'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-creme text-escuro min-h-screen font-sans">

    <header class="sticky top-0 bg-marinho text-white shadow-md z-50 p-4">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black tracking-tighter">GENTE DA <span class="text-amarelo">FEIRA</span></h1>
            <div id="auth-status">
                <button onclick="login()" class="bg-amarelo text-marinho px-3 py-1 rounded-md text-xs font-bold uppercase tracking-widest">Entrar</button>
            </div>
        </div>
    </header>

    <nav class="p-4 overflow-x-auto whitespace-nowrap border-b border-cinza bg-white/30 backdrop-blur-sm">
        <button class="px-4 py-1 rounded-full bg-marinho text-white text-sm mr-2 font-bold">Feira Toda</button>
        <button class="px-4 py-1 rounded-full bg-white border border-cinza text-marinho text-sm mr-2 font-medium">Tomba</button>
        <button class="px-4 py-1 rounded-full bg-white border border-cinza text-marinho text-sm mr-2 font-medium">SIM</button>
        <button class="px-4 py-1 rounded-full bg-white border border-cinza text-marinho text-sm mr-2 font-medium">Campo Limpo</button>
    </nav>

    <main id="feed" class="max-w-md mx-auto p-4 space-y-4 pb-24">
        <div class="p-5 bg-white rounded-xl border-b-4 border-amarelo shadow-sm">
            <div class="flex justify-between items-start mb-2">
                <span class="text-[10px] font-bold uppercase tracking-widest bg-marinho text-white px-2 py-0.5 rounded">Vaga de Emprego</span>
                <span class="text-xs text-gray-500">Hoje, 09:30</span>
            </div>
            <h3 class="font-bold text-lg leading-tight mb-1">Ajudante de Carga - Tomba</h3>
            <p class="text-sm text-gray-600 mb-4">Empresa local busca início imediato. Deixe seu perfil abaixo.</p>
            <button class="w-full bg-creme border border-marinho text-marinho py-2 rounded-lg text-sm font-bold active:bg-amarelo transition-colors">Ver detalhes</button>
        </div>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 bg-marinho text-white border-t border-white/10 p-4">
        <div class="max-w-md mx-auto flex justify-around items-center">
            <button class="flex flex-col items-center gap-1">
                <div class="w-5 h-5 bg-amarelo rounded-sm"></div>
                <span class="text-[10px] font-bold uppercase">Início</span>
            </button>
            <button class="relative -top-8 bg-amarelo text-marinho w-14 h-14 rounded-full flex items-center justify-center shadow-2xl border-4 border-creme">
                <span class="text-2xl font-bold">+</span>
            </button>
            <button class="flex flex-col items-center gap-1 opacity-60">
                <div class="w-5 h-5 bg-white rounded-sm"></div>
                <span class="text-[10px] font-bold uppercase">Perfil</span>
            </button>
        </div>
    </footer>
    <dialog id="modal-post" class="rounded-2xl shadow-2xl p-0 w-full max-w-md bg-creme overflow-hidden">
    <div class="bg-marinho p-4 flex justify-between items-center text-white">
        <h2 class="font-bold">Novo Aviso no Bairro</h2>
        <button onclick="document.getElementById('modal-post').close()" class="text-amarelo font-bold">X</button>
    </div>
    <form id="form-post" class="p-6 space-y-4">
        <div>
            <label class="block text-[10px] font-bold uppercase mb-1">Título</label>
            <input type="text" id="post-titulo" required placeholder="Ex: Vaga de Vendedor" class="w-full p-3 border border-cinza rounded-lg outline-none focus:border-marinho">
        </div>
        <div>
            <label class="block text-[10px] font-bold uppercase mb-1">Bairro</label>
            <select id="post-bairro" class="w-full p-3 border border-cinza rounded-lg bg-white">
                <option value="Tomba">Tomba</option>
                <option value="SIM">SIM</option>
                <option value="Campo Limpo">Campo Limpo</option>
                <option value="Centro">Centro</option>
                <option value="Feira Toda">Feira Toda</option>
            </select>
        </div>
        <div>
            <label class="block text-[10px] font-bold uppercase mb-1">O que está a acontecer?</label>
            <textarea id="post-conteudo" required rows="4" placeholder="Descreve os detalhes..." class="w-full p-3 border border-cinza rounded-lg outline-none focus:border-marinho"></textarea>
        </div>
        <button type="submit" class="w-full bg-amarelo text-marinho py-4 rounded-xl font-black uppercase tracking-widest shadow-lg">Publicar Agora</button>
    </form>
</dialog>
    <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js')
        .then(reg => console.log('Service Worker ativo!', reg))
        .catch(err => console.log('Erro ao registrar SW:', err));
    });
  }
</script>

</body>
</html>
